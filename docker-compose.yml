services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cairo-transport-backend
    ports:
      - "8000:8000"
    environment:
      CAIRO_TRANSPORT_DB_PATH: /app/data/cairo_transport.db
    volumes:
      - cairo_transport_data:/app/data
      - cairo_transport_output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/network/summary', timeout=5).read()"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cairo-transport-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cairo_transport_data:
  cairo_transport_output:
